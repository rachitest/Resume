    Experience:
      - company: The Dow Chemical Company
        position: ML R&D Intern
        location: Lake Jackson, TX
        start_date: 2025-05
        end_date: 2025-08
        highlights:
          - Shipped an R Shiny decision-support app that automated 50% of
            enterprise Life Cycle Assessment workflows, estimated at $15M in
            annual cost savings across Dow's global operations.
          - Benchmarked Bayesian models (Gaussian process regression, Bayesian
            neural networks, Monte Carlo dropout neural networks) against
            frequentist counterparts across 25+ measurement-error scenarios
            using PICP, ECE, and CI-width calibration metrics.
          - Authored an internal MiLOS Bayesian UQ white paper distilling the
            benchmark into organizational guidance for future predictive
            modeling projects.
      - company: UTHealth Houston, School of Public Health
        position: Research Data Scientist (PhD)
        location: Houston, TX
        start_date: 2022-08
        end_date: 2026-08
        highlights:
          - Dissertation research on traumatic brain injury outcome prediction
            spanning a PRISMA 2020 systematic review of ML and DL methods,
            unimodal deep learning on hourly ICU physiological signals from
            TRACK-TBI benchmarked against classical-ML baselines, and an
            explainable multimodal deep-learning model with XAI layers.
          - Contributed quantitative analyses on claims data and EHR data to an R01 grant proposal on disability in adolescents and young adults.
          - Shipped an R Shiny tool mapping Children with Disabilities Algorithm (CWDA) codes to ICD-10 codes, which was adopted for cross-team use.
          - Designed the multi-site star schema and ETL for the R33 phase of
            DETECT-RPC, harmonizing clinical records from 6 academic medical
            centers.
          - Built a Quarto dashboard that gave PIs real-time
            visibility into multi-site data collection progress
          - Supervised 2 M.S. students on quantitative analyses and
            data-cleaning tasks for DETECT-RPC
          - Led a team evaluating LLM feasibility for free-text
            physician-note classification in DETECT-RPC, informing the
            project's NLP pipeline design.
          - Built an agentic LLM pipeline that migrated the r4epi open
            textbook from R Markdown to Quarto, chaining file transfer, code
            reformatting, and grammar transformation.
          - Cut data-munging turnaround 24x by re-architecting the TexasCARES
            ETL, freeing the team to iterate on models weekly instead of
            monthly.
          - Stood up CI/CD automated reporting that ingests new data weekly,
            runs quality checks, and publishes stakeholder outputs without
            manual intervention, backed by a full lifecycle test suite.
          - Supervised 2 M.S. students on manual QA/QC of TexasCARES
            automated reports.
          - Co-authored 4 peer-reviewed publications on SARS-CoV-2 vaccine
            non-response and pediatric COVID comorbidities using survival
            analysis, mixed models, and tidymodels on population-based
            cohorts.
          - Led a 2-person TA team for PH 1976 (Fundamentals of Data
            Analytics and Predictions, 2025); prior TA for PH 1998
            (Statistical and Data Science Programming, 2020).
      - company: UTHealth Houston, School of Public Health
        position: Research Data Scientist (MS)
        location: Houston, TX
        start_date: 2020-02
        end_date: 2022-05
        highlights:
          - Shipped and maintained a public-facing statewide COVID-19
            dashboard (Python, Tableau) for the Texas COVID-19 Dashboard
            Project, ingesting case and antibody survey data continuously.
          - Engineered ETL pipelines for TexasCARES, handling PII with quality controls from ingestion to publication.
          - Deployed Streamlit applications for BioRec, making academic
            conference and journal recommendations accessible to researchers
            through an interactive UI.
      - company: Genentech
        position: Informatics Intern
        location: San Francisco, CA
        start_date: 2021-05
        end_date: 2022-01
        highlights:
          - Reproduced the published GLIT multimodal graph neural network on
            DILI benchmarks, then prototyped a lower-complexity MLP over ECFP
            fingerprints and drug diffusion profiles in PyTorch Lightning to
            test whether model complexity could be reduced without
            meaningfully hurting performance.
          - Built a document tokenization framework to feed
            internal NLP annotation and text-mining pipelines.
      - company: Procter & Gamble
        position: Advanced Analytics Co-Op
        location: Cincinnati, OH
        start_date: 2021-01
        end_date: 2021-04
        highlights:
          - Delivered predictive and explanatory models on shopper and
            retailer behavior for global Fabric Care brand teams, informing
            corporate strategy around DTC ecommerce.
          - Raised cross-functional analyst throughput 1.5x by building GCP
            big-data ETL pipelines using Apache Airflow.
          - Raised codebase test coverage from 0% to 70% by introducing
            containerization, unit testing, and agile practices.
      - company: Bristol Myers Squibb
        position: Data Engineering Intern
        location: San Francisco, CA
        start_date: 2020-06
        end_date: 2020-08
        highlights:
          - Built PatRec, a full-stack patent recommendations app chaining
            chemical-entity NER, NCBI federated search, and TF-IDF
            cosine-similarity ranking to curate relevant patents from an
            80M-patent corpus for internal BMS scientists.
          - Designed relational (PostgreSQL) and graph (Neo4j) database
            architectures supporting multiple internal R&D analytical
            workloads.
