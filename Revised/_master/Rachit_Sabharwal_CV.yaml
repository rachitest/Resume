    Professional Summary:
      - Ph.D. candidate at UTHealth Houston (expected defense Aug 2026) with
        6+ years across industry internships and research roles, building
        production data systems, predictive models, and decision-support tools
        in healthcare, life sciences, consumer packaged goods, and process
        manufacturing. Comfortable owning work end-to-end — from ETL and
        modeling through stakeholder-facing dashboards and white papers — with
        a dissertation focused on explainable multimodal AI for severe TBI
        outcome prediction.
