    Professional Summary:
      - Ph.D. candidate (expected Aug 2026, UTHealth) with
        6+ years generating real-world evidence from EHR, claims, and survey
        data. Deep expertise in causal inference, biostatistics, and ML
        applied to clinical outcomes research including vaccine effectiveness,
        pediatric comorbidities, and disability in AYA populations. Published
