        end_date: 2025-04
      
      - institution: University of Rochester
        area: Environmental Health
        degree: Bachelor of Science
        location: Rochester, NY
        start_date: 2014-09
        end_date: 2018-05
    Experience:
      - company: The Dow Chemical Company
        position: Machine Learning R&D Intern
        location: Lake Jackson, TX
        start_date: 2025-05
        end_date: 2025-08
        highlights:
          - Generated $15M in annual cost savings by developing an R application
            that automated 50% of enterprise-wide Life Cycle Assessment (LCA) 
            workflows.
          - Improved predictive model reliability by 20-30% through the 
            development and implementation of a novel Bayesian Uncertainty 
            Quantification (UQ) framework for real-world simulation data.
      - company: Genentech
        position: Research and Early Development, Development Sciences &
          Informatics - Informatics Intern
        location: San Francisco, CA
        start_date: 2021-05
        end_date: 2022-01
        highlights:
          - Accelerated drug safety screening by building a deep neural network 
            to predict adverse drug events, improving early-stage toxicity 
            detection capabilities.
          - Mapped complex drug-gene interactions by engineering a scalable 
            Knowledge Graph and Graph Neural Network, enabling faster 
            identification of novel therapeutic signatures.
          - Streamlined internal data discovery by developing a document 
            tokenization framework for a scalable text-mining application.
      - company: Procter & Gamble
        position: Consumer & Market Knowledge - Advanced Analytics Co-Op
        location: Cincinnati, OH
        start_date: 2021-01
        end_date: 2021-05
        highlights:
          - Drove strategic marketing decisions by developing predictive models 
            and interactive visualizations to map consumer and shopper 
            behavioral trends.
          - Unlocked new insights into market dynamics and retailer behavior by 
            engineering high-performance predictive models using parallel 
            computing frameworks.
          - Ensured high-availability data access for analytics teams by 
            architecting and maintaining big data ETL pipelines on Google Cloud 
            Platform.
      - company: Bristol Myers Squibb
        position: Data Engineering Intern
        location: San Francisco, CA
        start_date: 2020-06
        end_date: 2020-08
        highlights:
          - Significantly improved R&D workflow efficiency by full-stack 
            developing a multi-featured patent recommendation application.
          - Optimized data infrastructure by developing and maintaining 
            automated ETL pipelines for diverse, multi-scale datasets.
          - Enhanced data querying performance and relationship mapping by 
            designing robust relational (PostgreSQL) and graph (Neo4j) database 
            architectures.
    Selected Publications:
      - title: Trust and Uncertainty Quantification in Machine Learning Models
