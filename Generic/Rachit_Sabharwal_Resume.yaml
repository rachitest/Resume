    Experience:
      - company: The Dow Chemical Company
        position: Machine Learning R&D Intern
        location: Lake Jackson, TX
        start_date: 2025-05
        end_date: 2025-08
        highlights:
          - Enabled ~$15M in annual cost savings by developing an R 
            application that automated 50% of enterprise-wide Life Cycle 
            Assessment (LCA) workflows for cross-functional teams.
          - Improved predictive model reliability by 20-30% by designing a 
            Bayesian Uncertainty Quantification (UQ) framework, 
            enabling leadership to make data-driven decisions on real-world 
            simulations.
      - company: Genentech
        position: Informatics R&D Intern
        location: San Francisco, CA
        start_date: 2021-05
        end_date: 2022-01
        highlights:
          - Accelerated drug safety screening pipelines by building a deep 
            neural network to predict adverse drug events, directly improving 
            early-stage toxicity detection capabilities.
          - Engineered a scalable Knowledge Graph and Graph Neural Network to 
            map complex drug-gene interactions, empowering R&D teams to 
            rapidly identify novel therapeutic signatures.
          - Streamlined internal data discovery for enterprise users by 
            developing a scalable document tokenization framework for 
            text-mining applications.
      - company: Procter & Gamble
        position: Consumer & Market Knowledge - Advanced Analytics Co-Op
        location: Cincinnati, OH
        start_date: 2021-01
        end_date: 2021-05
        highlights:
          - Supported data acquisition strategies by developing explanatory 
            models that delivered actionable shopper insights and market trends 
            to global brand teams within the Fabric Care portfolio.
          - Advised ecommerce ad placement strategies by engineering 
            high-performance predictive models using parallel 
            computing frameworks to analyze ecommerce dynamics and retailer 
            behavior.
          - Developed and maintained big data ETL pipelines on Google Cloud 
            Platform (GCP), ensuring high-availability data access for 
            cross-functional analytics and marketing teams.
      - company: Bristol Myers Squibb
        position: Data Engineering Intern
        location: San Francisco, CA
        start_date: 2020-06
        end_date: 2020-08
        highlights:
          - Improved cross-functional R&D workflow efficiency by full-stack 
            developing a multi-featured patent recommendation application used 
            by internal scientists.
          - Optimized team data infrastructure by developing automated 
            ETL pipelines and designing robust relational (PostgreSQL) and graph
            (Neo4j) database architectures for multi-scale datasets.
