cv:
  name: Rachit Sabharwal
  location: Cypress, Texas
  phone: tel:+1 585-281-1928
  email: rachit-sabharwal@outlook.com
  social_networks:
    - network: GitHub
      username: rachitest
  sections:
    Professional Summary:
      - Ph.D. candidate (expected Aug 2026) with 6+ years translating
        business questions into analytical frameworks, owning recurring
        reporting workflows, and delivering stakeholder-facing dashboards
        across chemicals, consumer packaged goods, pharma, and public-health 
        settings. Strong SQL, Python, R, and Tableau; comfortable mentoring 
        junior analysts and converting structured and unstructured data into 
        actionable insights for business and product leadership.

    Education:
      - institution: The University of Texas Health Science Center at Houston
        area: Epidemiology and Biostatistics
        degree: Ph.D.
        location: Houston, TX
        start_date: 2022-08
        end_date: 2026-08
        highlights:
          - "Focus: Explainable AI"
          - "Certificates: Advanced Data Science"
      - institution: The University of California, Berkeley
        area: Software Development and Programming
        degree: Cert.
        location: Berkeley, CA
        start_date: 2023-06
        end_date: 2025-04
      - institution: The University of Texas Health Science Center at Houston
        area: Biostatistics
        degree: M.S.
        location: Houston, TX
        start_date: 2020-01
        end_date: 2022-05
      - institution: University of Rochester
        area: Environmental Health
        degree: B.S.
        location: Rochester, NY
        start_date: 2014-09
        end_date: 2018-05

    Experience:
      - company: The University of Texas Health Science Center at Houston
        position: Research Data Scientist, School of Public Health
        location: Houston, TX
        start_date: 2020-02
        end_date: present
        highlights:
          - Shipped a public-facing statewide COVID-19 dashboard (Python,
            Tableau) ingesting case and antibody-survey data continuously,
            and internal Quarto dashboards giving PIs real-time visibility
            into multi-site data-collection progress.
          - "Owned recurring reporting for TexasCARES: cut data-munging
            turnaround 24x by re-architecting the ETL, then stood up CI/CD
            automated reporting backed by a full lifecycle test suite that
            ingests new data weekly, runs quality checks, and publishes
            stakeholder outputs without manual intervention."
          - Designed a multi-site star schema and ETL for DETECT-RPC
            harmonizing clinical records from 6 academic medical centers;
            partnered with PIs to translate research questions into query
            and reporting specifications.
          - Conducted historical cohort investigations — survival analysis,
            linear mixed models, and causal-inference methods — on
            population-based SARS-CoV-2 and pediatric-COVID data,
            co-authoring 4 peer-reviewed publications.
          - Supervised 2 M.S. students across DETECT-RPC analyses and
            TexasCARES QA/QC; led a 2-person TA team for PH 1976
            (Fundamentals of Data Analytics and Predictions), coaching
            students on SQL, reporting, and statistical programming.
          - Led a team evaluating LLM feasibility for free-text
            physician-note classification (DETECT-RPC) and built an agentic
            LLM pipeline that migrated the r4epi open textbook from R
            Markdown to Quarto end-to-end.

      - company: The Dow Chemical Company
        position: R&D Intern, Machine Learning, Optimization & Statistics
          (MiLOS), Core R&D
        location: Lake Jackson, TX
        start_date: 2025-05
        end_date: 2025-08
        highlights:
          - Shipped an R Shiny decision-support app automating 50% of
            enterprise Life Cycle Assessment workflows, estimated at $15M
            in annual cost savings across Dow's global operations.
          - Benchmarked predictive models under 25+ measurement-error
            scenarios using PICP, ECE, and CI-width calibration metrics to
            quantify forecast reliability for business stakeholders.
          - Authored an internal white paper adopted as organizational
            guidance for future predictive modeling and reporting projects.

      - company: Procter & Gamble
        position: Advanced Analytics Co-Op, Consumer & Market Knowledge
        location: Cincinnati, OH
        start_date: 2021-01
        end_date: 2021-05
        highlights:
          - Delivered predictive and explanatory models on shopper and
            retailer behavior for global Fabric Care brand teams, informing
            a corporate focus shift toward DTC ecommerce.
          - Raised cross-functional analyst throughput 1.5x by building GCP
            big-data ETL pipelines on Apache Airflow; raised codebase test
            coverage from 0% to 70% by introducing containerization, unit
            testing, and agile practices.

      - company: Genentech
        position: Informatics R&D Intern, Development Sciences & Informatics
        location: San Francisco, CA
        start_date: 2021-05
        end_date: 2022-01
        highlights:
          - Reproduced a published multimodal GNN on DILI benchmarks and
            prototyped a simpler alternative to test tradeoffs between model 
            complexity and performance.
          - Built a document tokenization framework feeding downstream NLP
            annotation and text-mining pipelines on unstructured scientific
            text.

      - company: Bristol Myers Squibb
        position: Data Engineering Intern
        location: San Francisco, CA
        start_date: 2020-06
        end_date: 2020-08
        highlights:
          - Built PatRec, a full-stack patent recommendations app chaining
            entity recognition, federated search, and similarity ranking to
            curate relevant patents from an 80M-patent corpus for internal
            BMS scientists.
          - Designed relational (PostgreSQL) and graph (Neo4j) database
            architectures supporting multiple internal R&D analytical
            workloads.

    Selected Publications:
      - title: Trust and Uncertainty Quantification in Machine Learning
          Models Under Measurement Error
        authors:
          - '**Sabharwal R**'
        date: 2025-08
        journal: The Dow Chemical Company, Internal White Paper
      - title: Long-term immune response to SARS-CoV-2 infection and
          vaccination in children and adolescents
        authors:
          - Messiah SE
          - Talebi Y
          - Swartz MD
          - '**Sabharwal R**'
          - et al.
        date: 2023-10
        doi: 10.1038/s41390-023-02857-y
        journal: Pediatric Research
      - title: 'Scholarly recommendation systems: a literature survey'
        authors:
          - Zhang Z
          - Patra BG
          - '**Sabharwal R**'
          - et al.
        date: 2023-06
        doi: 10.1007/s10115-023-01901-x
        journal: Knowledge and Information Systems

    Skills:
      - label: "Analytics & Statistics"
        details: "Exploratory Data Analysis, Cohort & Historical Trend
          Analysis, Experimentation & A/B Testing, Survival Analysis, Mixed
          Models, Causal Inference, Measurement Error Modeling, Forecasting,
          Bayesian Inference & UQ, Predictive & Prescriptive Analytics"
      - label: "Programming & Data"
        details: "SQL, Python (polars, pandas, duckdb), R (data.table,
          tidyverse, tidymodels), SAS, Bash"
      - label: "Visualization & Reporting"
        details: "Tableau, R Shiny, Streamlit, Python Dash, Quarto, Plotly,
          ggplot2, DT"
      - label: "Data Platforms & Engineering"
        details: "BigQuery, PostgreSQL, Neo4j, Apache Airflow, GCP, AWS,
          Azure, Docker, GitHub/GitLab CI/CD"
      - label: "Machine Learning & AI"
        details: "scikit-learn, PyTorch, Hugging Face, NLP on unstructured
          text, LLM Agentic Pipelines, Recommender Systems, Explainable AI"

design:
  theme: harvard
  page:
    size: us-letter
    top_margin: 0.5in
    bottom_margin: 0.5in
    left_margin: 0.5in
    right_margin: 0.5in
    show_footer: true
    show_top_note: false
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    font_family: XCharter
    line_spacing: 0.6em
    alignment: left
    date_and_location_column_alignment: right
    font_size:
      body: 10pt
      name: 25pt
      headline: 10pt
      connections: 9pt
      section_titles: 1.3em
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    photo_width: 3.5cm
    space_below_name: 0.5cm
    space_below_connections: 0.5cm
    connections:
      hyperlink: true
      show_icons: false
      display_urls_instead_of_usernames: true
      separator: •
      space_between_connections: 0.4cm
  section_titles:
    type: centered_with_centered_partial_line
    line_thickness: 0.5pt
    space_above: 0.5cm
    space_below: 0.2cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 1em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    date_and_location_width: 3.5cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em
  templates:
    footer: '*NAME -- PAGE_NUMBER/TOTAL_PAGES*'
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        SUMMARY
        HIGHLIGHTS
      degree_column: '**DEGREE**'
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
locale:
  language: english
