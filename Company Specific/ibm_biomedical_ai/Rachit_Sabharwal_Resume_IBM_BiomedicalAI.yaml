cv:
  name: Rachit Sabharwal
  location: Cypress, Texas
  phone: tel:+1 585-281-1928
  email: rachit-sabharwal@outlook.com
  social_networks:
    - network: GitHub
      username: rachitest
  sections:
    Professional Summary:
      - Ph.D. Candidate (expected Aug 2026) and 6+ years building and deploying
        statistical models and biomedical AI systems across clinical, pharma, and
        research environments. Dissertation develops explainable multimodal AI for
        severe TBI outcome prediction, integrating heterogeneous biomedical data
        sources. Track record of translating research findings into production
        systems and peer-reviewed publications.

    Education:
      - institution: The University of Texas Health Science Center at Houston
        area: Epidemiology and Biostatistics
        degree: Ph.D.
        location: Houston, TX
        date: "Expected Aug 2026"
        highlights:
          - "Focus: Explainable AI"
          - "Certificates: Advanced Data Science"
      - institution: The University of California, Berkeley
        area: Software Development and Programming
        degree: Cert.
        location: Berkeley, CA
        end_date: 2025-04
      - institution: The University of Texas Health Science Center at Houston
        area: Biostatistics
        degree: M.S.
        location: Houston, TX
        end_date: 2022-05
      - institution: University of Rochester
        area: Environmental Health
        degree: B.S.
        location: Rochester, NY
        end_date: 2018-05

    Experience:
      - company: The University of Texas Health Science Center at Houston
        position: Research Data Scientist
        location: Houston, TX
        start_date: 2020-02
        end_date: present
        highlights:
          - Conducted a systematic review of ML/DL methods for severe TBI outcome
            prediction and benchmarked unimodal deep learning on TBI ICU time-series
            signals against classical-ML baselines across multiple biomedical data
            sources.
          - Developing an XAI multimodal biomedical AI model fusing heterogeneous
            clinical signals (imaging, physiologic, structured EHR) for TBI outcome
            prediction.
          - Led a team evaluating LLM feasibility for automated extraction and
            classification of free-text physician notes in DETECT-RPC, informing the
            project's clinical NLP pipeline design.
          - Cut data-munging turnaround 24x by re-architecting the TexasCARES ETL
            pipelines across multiple data sources; stood up CI/CD automated
            reporting that ingests new data weekly, runs quality checks, and publishes
            stakeholder outputs without manual intervention.
          - Co-authored 4 peer-reviewed publications using survival analysis, linear
            mixed models, and other statistical methods on population-based biomedical
            cohorts (SARS-CoV-2 vaccine non-response, pediatric COVID comorbidities).

      - company: The Dow Chemical Company
        position: ML R&D Intern
        location: Lake Jackson, TX
        start_date: 2025-05
        end_date: 2025-08
        highlights:
          - Benchmarked Bayesian statistical models (Gaussian process regression,
            Bayesian neural networks, Monte Carlo dropout) against frequentist
            counterparts across 25+ measurement-error scenarios using UQ calibration
            metrics.
          - Authored an internal Bayesian UQ white paper (MiLOS) adopted as
            organizational guidance for future predictive modeling projects; shipped
            a decision-support tool estimated at $15M annual savings.

      - company: Genentech
        position: Informatics R&D Intern
        location: San Francisco, CA
        start_date: 2021-05
        end_date: 2022-01
        highlights:
          - Reproduced the published GLIT multimodal GNN for drug-induced liver injury
            (DILI) prediction, then designed and validated an alternative MLP combining
            ECFP molecular fingerprints with drug diffusion profiles that matched GLIT
            within 10% predictive performance at reduced model complexity
          - Built a document tokenization framework supporting downstream biomedical
            NLP annotation and text-mining pipelines.

      - company: Bristol Myers Squibb
        position: Data Engineering Intern
        location: San Francisco, CA
        start_date: 2020-06
        end_date: 2020-08
        highlights:
          - Built PatRec, a full-stack biomedical patent recommendation system
            chaining chemical-entity NER, NCBI federated literature search, and
            TF-IDF cosine-similarity ranking to surface relevant patents from an
            80M-patent corpus for internal R&D scientists.
          - Designed relational (PostgreSQL) and graph (Neo4j) database architectures
            supporting multiple biomedical R&D analytical workloads.

      - company: Procter & Gamble
        position: Advanced Analytics Co-Op
        location: Cincinnati, OH
        start_date: 2021-01
        end_date: 2021-05
        highlights:
          - Delivered predictive and explanatory models on consumer behavior;
            raised analyst throughput 1.5x with GCP big-data ETL pipelines using
            Apache Airflow.

    Selected Publications:
      - title: Trust and Uncertainty Quantification in Machine Learning
          Models Under Measurement Error
        authors:
          - '**Sabharwal R**'
        date: 2025-08
        journal: The Dow Chemical Company, Internal White Paper
      - title: Baseline characteristics of SARS-CoV-2 vaccine non-responders
          in a large population-based sample
        authors:
          - Yaseen A
          - DeSantis SM
          - '**Sabharwal R**'
          - et al.
        date: 2024-05
        doi: 10.1371/journal.pone.0303420
        journal: PLoS One
      - title: 'Scholarly recommendation systems: a literature survey'
        authors:
          - Zhang Z
          - Patra BG
          - '**Sabharwal R**'
          - et al.
        date: 2023-06
        doi: 10.1007/s10115-023-01901-x
        journal: Knowledge and Information Systems

    Skills:
      - label: "Biomedical AI & Statistical Modeling"
        details: "Multimodal Deep Learning, Graph Neural Networks, Explainable AI,
          Bayesian Inference & UQ, Survival Analysis, Mixed Models, NLP, LLMs,
          Recommender Systems, Biomedical Data Integration"
      - label: "ML/AI Libraries"
        details: "PyTorch, PyTorch Lightning, Hugging Face, TensorFlow, TensorFlow
          Probability, scikit-learn, tidymodels, brms, Optuna, SHAP, RDKit"
      - label: "Programming & Algorithms"
        details: "Python, R, SQL, Bash"
      - label: "MLOps & Cloud"
        details: "Docker, Kubernetes, Apache Airflow, GitHub/GitLab CI/CD,
          GCP, AWS, Azure, PostgreSQL, pgvector, Neo4j, BigQuery"

design:
  theme: harvard
  page:
    size: us-letter
    top_margin: 0.5in
    bottom_margin: 0.5in
    left_margin: 0.5in
    right_margin: 0.5in
    show_footer: true
    show_top_note: false
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    font_family: XCharter
    line_spacing: 0.6em
    alignment: left
    date_and_location_column_alignment: right
    font_size:
      body: 10pt
      name: 25pt
      headline: 10pt
      connections: 9pt
      section_titles: 1.3em
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    photo_width: 3.5cm
    space_below_name: 0.5cm
    space_below_connections: 0.5cm
    connections:
      hyperlink: true
      show_icons: false
      display_urls_instead_of_usernames: true
      separator: •
      space_between_connections: 0.4cm
  section_titles:
    type: centered_with_centered_partial_line
    line_thickness: 0.5pt
    space_above: 0.5cm
    space_below: 0.2cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 1em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    date_and_location_width: 3.5cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em
  templates:
    footer: '*NAME -- PAGE_NUMBER/TOTAL_PAGES*'
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        SUMMARY
        HIGHLIGHTS
      degree_column: '**DEGREE**'
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**
        POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
