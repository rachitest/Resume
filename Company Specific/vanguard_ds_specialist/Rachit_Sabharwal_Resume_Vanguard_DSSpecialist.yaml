cv:
  name: Rachit Sabharwal
  location: Cypress, Texas
  phone: tel:+1 585-281-1928
  email: rachit-sabharwal@outlook.com
  social_networks:
    - network: GitHub
      username: rachitest
  sections:
    Professional Summary:
      - Ph.D. candidate (expected Aug 2026) with 6+ years delivering
        production data systems, predictive and generative AI models, and
        stakeholder-facing decision-support tools across regulated enterprise
        settings (chemicals, pharma, CPG, public health). Owns work end-to-end
        from SQL and ETL through modeling, governance, and dashboards.
        Hands-on with Python, R, SQL, scikit-learn, TensorFlow, and
        LLM agentic pipelines; mentors junior analysts and students.

    Education:
      - institution: The University of Texas Health Science Center at Houston
        area: Epidemiology and Biostatistics
        degree: Ph.D.
        location: Houston, TX
        start_date: 2022-08
        end_date: 2026-08
        highlights:
          - "Focus: Explainable AI"
          - "Certificates: Advanced Data Science"
      - institution: The University of California, Berkeley
        area: Software Development and Programming
        degree: Cert.
        location: Berkeley, CA
        start_date: 2023-06
        end_date: 2025-04
      - institution: The University of Texas Health Science Center at Houston
        area: Biostatistics
        degree: M.S.
        location: Houston, TX
        start_date: 2020-01
        end_date: 2022-05
      - institution: University of Rochester
        area: Environmental Health
        degree: B.S.
        location: Rochester, NY
        start_date: 2014-09
        end_date: 2018-05

    Experience:
      - company: The University of Texas Health Science Center at Houston
        position: Research Data Scientist, School of Public Health
        location: Houston, TX
        start_date: 2020-02
        end_date: present
        highlights:
          - Dissertation on explainable multimodal deep learning for severe
            TBI outcome prediction, spanning a PRISMA systematic review,
            temporal deep models on hourly ICU physiological signals
            benchmarked against classical-ML baselines, and an explainable
            multimodal fusion model.
          - Built an agentic LLM pipeline (ellmer, Groq, DeepSeek R1 70B)
            that migrated the r4epi open textbook from R Markdown to Quarto,
            chaining file transfer, code reformatting, and grammar
            transformation through a prompt-engineered multi-step workflow.
          - Led a team evaluating LLM feasibility for free-text
            physician-note classification in DETECT-RPC, informing the
            project's NLP pipeline design; designed a multi-site star schema
            and ETL harmonizing clinical records across 6 academic medical
            centers.
          - Cut data-munging turnaround 24x by re-architecting the TexasCARES
            ETL; stood up CI/CD automated reporting backed by a full
            lifecycle test suite that ingests new data weekly, runs quality
            checks, and publishes stakeholder outputs without manual
            intervention.
          - Shipped a public-facing statewide COVID-19 dashboard (Python,
            Tableau) ingesting case and antibody-survey data continuously,
            plus internal Quarto dashboards giving PIs real-time visibility
            into multi-site data collection.
          - Supervised 2 M.S. students across DETECT-RPC analyses and
            TexasCARES QA/QC; led a 2-person TA team for PH 1976
            (Fundamentals of Data Analytics and Predictions).
          - Co-authored 4 peer-reviewed publications using survival analysis,
            linear mixed models, and causal-inference methods on
            population-based cohorts.

      - company: The Dow Chemical Company
        position: R&D Intern, Machine Learning, Optimization & Statistics
          (MiLOS), Core R&D
        location: Lake Jackson, TX
        start_date: 2025-05
        end_date: 2025-08
        highlights:
          - Benchmarked Bayesian models (Gaussian process regression,
            Bayesian neural networks, Monte Carlo dropout) against
            frequentist counterparts across 25+ measurement-error scenarios
            using PICP, ECE, and CI-width calibration metrics.
          - Shipped an R Shiny decision-support app automating 50% of
            enterprise Life Cycle Assessment workflows, estimated at $15M in
            annual cost savings across Dow's global operations.
          - Authored an internal Bayesian UQ white paper (MiLOS) adopted as
            organizational guidance for future predictive modeling projects,
            covering validation, calibration, and responsible-AI practices.

      - company: Procter & Gamble
        position: Advanced Analytics Co-Op, Consumer & Market Knowledge
        location: Cincinnati, OH
        start_date: 2021-01
        end_date: 2021-05
        highlights:
          - Delivered predictive and explanatory models on shopper and
            retailer behavior for global Fabric Care brand teams, informing
            a corporate focus shift toward DTC ecommerce.
          - Raised cross-functional analyst throughput 1.5x by building GCP
            big-data ETL pipelines on Apache Airflow; raised codebase test
            coverage from 0% to 70% by introducing containerization, unit
            testing, and agile practices.

      - company: Genentech
        position: Informatics R&D Intern, Development Sciences & Informatics
        location: San Francisco, CA
        start_date: 2021-05
        end_date: 2022-01
        highlights:
          - Reproduced the published GLIT multimodal GNN to benchmark DILI
            prediction, then prototyped an alternative MLP combining ECFP
            fingerprints with drug diffusion profiles in PyTorch Lightning.
          - Built a document tokenization framework feeding downstream NLP
            annotation and text-mining pipelines.

      - company: Bristol Myers Squibb
        position: Data Engineering Intern
        location: San Francisco, CA
        start_date: 2020-06
        end_date: 2020-08
        highlights:
          - Built PatRec, a full-stack patent recommendations app chaining
            chemical-entity NER, NCBI federated search, and TF-IDF
            cosine-similarity ranking to curate relevant patents from an
            80M-patent corpus for internal BMS scientists.
          - Designed relational (PostgreSQL) and graph (Neo4j) database
            architectures supporting multiple internal R&D analytical
            workloads.

    Selected Publications:
      - title: Trust and Uncertainty Quantification in Machine Learning
          Models Under Measurement Error
        authors:
          - '**Sabharwal R**'
        date: 2025-08
        journal: The Dow Chemical Company, Internal White Paper
      - title: Long-term immune response to SARS-CoV-2 infection and
          vaccination in children and adolescents
        authors:
          - Messiah SE
          - Talebi Y
          - Swartz MD
          - '**Sabharwal R**'
          - et al.
        date: 2023-10
        doi: 10.1038/s41390-023-02857-y
        journal: Pediatric Research
      - title: 'Scholarly recommendation systems: a literature survey'
        authors:
          - Zhang Z
          - Patra BG
          - '**Sabharwal R**'
          - et al.
        date: 2023-06
        doi: 10.1007/s10115-023-01901-x
        journal: Knowledge and Information Systems

    Skills:
      - label: "Machine Learning & AI"
        details: "Supervised & Unsupervised ML, Predictive & Prescriptive
          Analytics, Time-Series Forecasting, Multimodal Deep Learning, NLP,
          LLM Agentic Pipelines, Prompt Engineering, Embeddings & Retrieval,
          LLM APIs (Groq, Claude, Gemini, OpenAI-compatible), Bayesian
          Inference & UQ, Causal Inference, Measurement Error Modeling,
          Explainable & Responsible AI, Recommender Systems, Survival
          Analysis, Mixed Models"
      - label: "ML/Stats Libraries"
        details: "scikit-learn, TensorFlow, TensorFlow Probability, PyTorch,
          PyTorch Lightning, Hugging Face, statsmodels, lifelines,
          tidymodels, brms, Optuna"
      - label: "Programming & Data"
        details: "Python (polars, pandas, duckdb), R (data.table, tidyverse,
          ellmer), SQL, SAS, Bash"
      - label: "Data Platforms & MLOps"
        details: "Docker, Kubernetes, Apache Airflow, GitHub/GitLab CI/CD,
          GCP, AWS, Azure, BigQuery, PostgreSQL, Neo4j"
      - label: "Visualization & Reporting"
        details: "Tableau, R Shiny, Streamlit, Python Dash, Quarto, Plotly,
          ggplot2"

design:
  theme: harvard
  page:
    size: us-letter
    top_margin: 0.5in
    bottom_margin: 0.5in
    left_margin: 0.5in
    right_margin: 0.5in
    show_footer: true
    show_top_note: false
  colors:
    body: rgb(0, 0, 0)
    name: rgb(0, 0, 0)
    headline: rgb(0, 0, 0)
    connections: rgb(0, 0, 0)
    section_titles: rgb(0, 0, 0)
    links: rgb(0, 0, 0)
    footer: rgb(128, 128, 128)
    top_note: rgb(128, 128, 128)
  typography:
    font_family: XCharter
    line_spacing: 0.6em
    alignment: left
    date_and_location_column_alignment: right
    font_size:
      body: 10pt
      name: 25pt
      headline: 10pt
      connections: 9pt
      section_titles: 1.3em
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
    small_caps:
      name: false
      headline: false
      connections: false
      section_titles: false
  links:
    underline: false
    show_external_link_icon: false
  header:
    alignment: center
    photo_width: 3.5cm
    space_below_name: 0.5cm
    space_below_connections: 0.5cm
    connections:
      hyperlink: true
      show_icons: false
      display_urls_instead_of_usernames: true
      separator: •
      space_between_connections: 0.4cm
  section_titles:
    type: centered_with_centered_partial_line
    line_thickness: 0.5pt
    space_above: 0.5cm
    space_below: 0.2cm
  sections:
    allow_page_break: true
    space_between_regular_entries: 1em
    space_between_text_based_entries: 0.3em
    show_time_spans_in: []
  entries:
    date_and_location_width: 3.5cm
    side_space: 0.2cm
    space_between_columns: 0.1cm
    allow_page_break: false
    short_second_row: true
    summary:
      space_above: 0cm
      space_left: 0cm
    highlights:
      bullet: •
      nested_bullet: •
      space_left: 0.15cm
      space_above: 0cm
      space_between_items: 0cm
      space_between_bullet_and_text: 0.5em
  templates:
    footer: '*NAME -- PAGE_NUMBER/TOTAL_PAGES*'
    top_note: '*LAST_UPDATED CURRENT_DATE*'
    single_date: MONTH_ABBREVIATION YEAR
    date_range: START_DATE – END_DATE
    time_span: HOW_MANY_YEARS YEARS HOW_MANY_MONTHS MONTHS
    one_line_entry:
      main_column: '**LABEL:** DETAILS'
    education_entry:
      main_column: |-
        **INSTITUTION**, AREA
        SUMMARY
        HIGHLIGHTS
      degree_column: '**DEGREE**'
      date_and_location_column: |-
        LOCATION
        DATE
    normal_entry:
      main_column: |-
        **NAME**
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    experience_entry:
      main_column: |-
        **COMPANY**, POSITION
        SUMMARY
        HIGHLIGHTS
      date_and_location_column: |-
        LOCATION
        DATE
    publication_entry:
      main_column: |-
        **TITLE**
        SUMMARY
        AUTHORS
        URL (JOURNAL)
      date_and_location_column: DATE
locale:
  language: english
